<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>30秒対決</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 待機画面 -->
  <div id="ready-screen" class="screen active">
    <h1 class="app-title">30秒対決</h1>
    <button id="btn-start" class="start-btn">START</button>
  </div>

  <!-- カウントダウン画面 -->
  <div id="countdown-screen" class="screen">
    <div id="count-number" class="count-number">30</div>
    <div id="count-bar-wrap" class="count-bar-wrap">
      <div id="count-bar" class="count-bar"></div>
    </div>
  </div>

  <!-- 終了画面 -->
  <div id="done-screen" class="screen">
    <div class="done-text">TIME UP!</div>
    <button id="btn-again" class="start-btn">もう一回</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
